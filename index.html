<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Figtree:ital,wght@0,300..900;1,300..900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script defer src="./src/api.js"></script>
  <script defer src="./src/map.js"></script>

  <link href="./styles.css" rel="stylesheet">
  <title>Frontend Mentor | IP Address Tracker</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution {
      font-size: 0.6875rem;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body>

  <section class="container">
    <header class="header">
    <div class="content">

      <div id="search">
        <h2>IP Address Tracker</h2>

        <form class="row g-2">
          <div class="col-auto">
            <label for="searchInput"></label>
            <input id="searchInput" type="text" placeholder="Search for any IP address or domain">
          </div>
          <div class="col-auto">
            <button type="submit" class="search-btn">
              <img src="./images/icon-arrow.svg" alt="">
            </button>
          </div>
        </form>
        <div id="results" class="row text-center bg-white p-3 shadow">
          <div class="col">
            <small>IP Address</small>
            <p id="ip"></p>
          </div>
          <div class="col">
            <small> Location</small>
            <p id="location"></p>
          </div>
          <div class="col">
            <small>Timezone</small>
            <p id="timezone"></p>
          </div>
          <div class="col">
            <small>ISP</small>
            <p id="isp"></p>
          </div>

        </div>

      </div>

    </header>

       <div id="map"></div>

  </section>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>

</html>
